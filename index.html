<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#155eef">
  <meta name="description" content="Fokus – ein einfacher Aufgabenplaner für den Alltag.">
  <title>Fokus – Aufgabenplaner</title>
  <style>
    :root {
      color-scheme: light;
      --accent: #155eef;
      --accent-strong: #004eeb;
      --accent-soft: #eff4ff;
      --ink: #101828;
      --muted: #667085;
      --line: #e4e7ec;
      --page: #f8fafc;
      --surface: #ffffff;
      --success: #12a66a;
      --danger: #d92d4f;
      --warning: #f79009;
      --violet: #7a5af8;
      --radius: 12px;
      --shadow: 0 16px 42px rgba(16, 24, 40, .08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--ink);
      background: var(--page);
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: 3px solid rgba(21, 94, 239, .22);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-columns: 224px minmax(560px, 1fr) 280px;
      min-height: 100vh;
      max-width: 1600px;
      margin: 0 auto;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .sidebar, .summary {
      padding: 28px 22px;
      background: #fbfcfe;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 8px 32px;
      color: var(--accent);
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -.04em;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      color: white;
      background: var(--accent);
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav-button {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 0;
      border-radius: 10px;
      color: #475467;
      background: transparent;
      font-size: 14px;
      font-weight: 650;
      text-align: left;
    }

    .nav-button:hover { background: #f2f4f7; }
    .nav-button.active { color: var(--accent); background: var(--accent-soft); }
    .nav-button svg { width: 19px; height: 19px; }

    .sidebar-note {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    main {
      min-width: 0;
      padding: 30px 28px 48px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 26px;
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 5px; font-size: clamp(26px, 3vw, 34px); letter-spacing: -.04em; }
    .subtitle { margin: 0; color: var(--muted); font-size: 14px; }

    .search-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: #344054;
      background: white;
      font-size: 14px;
      font-weight: 650;
    }

    .search-toggle svg { width: 18px; height: 18px; }

    .search-box { display: none; margin-bottom: 14px; }
    .search-box.open { display: block; }
    .search-box input {
      width: 100%; min-height: 44px; padding: 0 14px;
      border: 1px solid var(--line); border-radius: 10px; color: var(--ink); background: white;
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 145px 132px auto;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fcfcfd;
    }

    .composer input, .composer select {
      min-width: 0;
      min-height: 44px;
      border: 1px solid #d0d5dd;
      border-radius: 9px;
      padding: 0 12px;
      color: var(--ink);
      background: white;
    }

    .primary {
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--accent);
      border-radius: 9px;
      color: white;
      background: var(--accent);
      font-size: 14px;
      font-weight: 750;
    }

    .primary:hover { background: var(--accent-strong); }

    .tabs {
      display: flex;
      gap: 26px;
      margin-top: 24px;
      border-bottom: 1px solid var(--line);
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      position: relative;
      min-height: 42px;
      padding: 0 2px;
      border: 0;
      color: var(--muted);
      background: transparent;
      font-size: 14px;
      font-weight: 680;
    }

    .tab.active { color: var(--accent); }
    .tab.active::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: -1px;
      left: 0;
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
    }

    .list-heading {
      display: grid;
      grid-template-columns: minmax(230px, 1fr) 110px 125px 72px;
      gap: 14px;
      padding: 15px 12px 10px 44px;
      color: #98a2b3;
      font-size: 11px;
      font-weight: 750;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .task-list { display: grid; }

    .task {
      display: grid;
      grid-template-columns: minmax(230px, 1fr) 110px 125px 72px;
      gap: 14px;
      align-items: center;
      min-height: 68px;
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      transition: background .18s ease;
    }

    .task:hover { background: #fafcff; }
    .task.completed .task-title { color: #98a2b3; text-decoration: line-through; }

    .task-main { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .task-title { overflow: hidden; font-size: 14px; font-weight: 630; text-overflow: ellipsis; white-space: nowrap; }

    .check {
      position: relative;
      flex: 0 0 20px;
      width: 20px;
      height: 20px;
      border: 1.5px solid #b8c0cc;
      border-radius: 6px;
      background: white;
      appearance: none;
    }

    .check:checked { border-color: var(--accent); background: var(--accent); }
    .check:checked::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .category {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .category-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .category[data-category="Privat"] .category-dot { background: var(--success); }
    .category[data-category="Finanzen"] .category-dot { background: var(--warning); }
    .category[data-category="Gesundheit"] .category-dot { background: var(--violet); }

    .date { color: var(--muted); font-size: 12px; }
    .date.overdue { color: var(--danger); font-weight: 700; }
    .date.today { color: var(--accent); font-weight: 700; }

    .task-actions { display: flex; justify-content: flex-end; gap: 4px; }
    .icon-button {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 8px;
      color: #98a2b3;
      background: transparent;
    }

    .icon-button:hover { color: var(--danger); background: #fff1f3; }
    .icon-button svg { width: 17px; height: 17px; }

    .empty {
      display: none;
      padding: 64px 20px;
      color: var(--muted);
      text-align: center;
    }

    .empty.show { display: block; }
    .empty strong { display: block; margin-bottom: 6px; color: var(--ink); font-size: 16px; }

    .summary {
      border-left: 1px solid var(--line);
      background: white;
    }

    .summary h2 { margin-bottom: 24px; font-size: 21px; letter-spacing: -.03em; }
    .progress-wrap { display: grid; place-items: center; padding: 4px 0 26px; border-bottom: 1px solid var(--line); }
    .progress-ring {
      --progress: 0deg;
      display: grid;
      place-items: center;
      width: 126px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--progress), #eef2f6 0);
    }

    .progress-ring::before {
      content: "";
      grid-area: 1 / 1;
      width: 104px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: white;
    }

    .progress-copy { z-index: 1; grid-area: 1 / 1; text-align: center; }
    .progress-copy strong { display: block; font-size: 25px; letter-spacing: -.04em; }
    .progress-copy span { color: var(--muted); font-size: 12px; }
    .progress-label { margin: 14px 0 0; color: var(--muted); font-size: 13px; }

    .summary-group { padding: 22px 0; border-bottom: 1px solid var(--line); }
    .summary-group:last-child { border-bottom: 0; }
    .summary-group h3 { margin-bottom: 12px; font-size: 13px; }
    .summary-item { display: flex; align-items: flex-start; gap: 9px; margin: 10px 0; color: #475467; font-size: 12px; line-height: 1.4; }
    .summary-item .category-dot { margin-top: 5px; flex: 0 0 7px; }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 10;
      padding: 12px 16px;
      border-radius: 10px;
      color: white;
      background: #101828;
      box-shadow: 0 12px 26px rgba(16, 24, 40, .22);
      font-size: 13px;
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 1120px) {
      .app { grid-template-columns: 190px minmax(0, 1fr); }
      .summary { display: none; }
    }

    @media (max-width: 760px) {
      body { background: white; }
      .app { display: block; min-height: 100vh; box-shadow: none; }
      .sidebar { display: block; position: sticky; top: 0; z-index: 5; padding: 14px 16px; border-right: 0; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.96); backdrop-filter: blur(12px); }
      .brand { margin: 0; font-size: 21px; }
      .brand-mark { width: 29px; height: 29px; border-radius: 9px; }
      .nav, .sidebar-note { display: none; }
      main { padding: 24px 16px 36px; }
      .page-header { align-items: flex-start; margin-bottom: 20px; }
      .search-toggle span { display: none; }
      .composer { grid-template-columns: 1fr 1fr; }
      .composer input[type="text"] { grid-column: 1 / -1; }
      .primary { grid-column: 1 / -1; }
      .tabs { gap: 18px; overflow-x: auto; }
      .list-heading { display: none; }
      .task { grid-template-columns: minmax(0, 1fr) auto; gap: 10px; min-height: 76px; padding: 12px 2px; }
      .task-main { align-self: start; padding-top: 3px; }
      .task-title { white-space: normal; }
      .category, .date { grid-column: 1; margin-left: 32px; }
      .category { display: none; }
      .date { grid-row: 2; }
      .task-actions { grid-column: 2; grid-row: 1 / 3; }
      .toast { right: 16px; bottom: 16px; left: 16px; text-align: center; }
    }

    @media (max-width: 430px) {
      .composer { grid-template-columns: 1fr; }
      .composer input[type="text"], .primary { grid-column: auto; }
      .tabs { gap: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Navigation">
      <div class="brand"><span class="brand-mark">✓</span>Fokus</div>
      <nav class="nav" id="sideNav">
        <button class="nav-button active" data-filter="all"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h10"/></svg>Meine Aufgaben</button>
        <button class="nav-button" data-filter="today"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4m8-4v4M3 10h18"/></svg>Heute</button>
        <button class="nav-button" data-filter="planned"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16v16H4zM8 3v4m8-4v4M4 10h16"/></svg>Geplant</button>
        <button class="nav-button" data-filter="completed"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="m8 12 2.5 2.5L16 9"/></svg>Erledigt</button>
      </nav>
      <p class="sidebar-note">Deine Aufgaben bleiben ausschließlich in diesem Browser gespeichert.</p>
    </aside>

    <main>
      <header class="page-header">
        <div><h1>Meine Aufgaben</h1><p class="subtitle" id="dateLine"></p></div>
        <button class="search-toggle" id="searchToggle" aria-expanded="false"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg><span>Suchen</span></button>
      </header>

      <div class="search-box" id="searchBox"><input id="searchInput" type="search" placeholder="Aufgaben durchsuchen" aria-label="Aufgaben durchsuchen"></div>

      <form class="composer" id="taskForm">
        <input id="taskTitle" type="text" maxlength="120" placeholder="Neue Aufgabe hinzufügen" aria-label="Neue Aufgabe hinzufügen" required>
        <input id="taskDate" type="date" aria-label="Fälligkeitsdatum" required>
        <select id="taskCategory" aria-label="Kategorie"><option>Arbeit</option><option>Privat</option><option>Finanzen</option><option>Gesundheit</option></select>
        <button class="primary" type="submit">Aufgabe hinzufügen</button>
      </form>

      <div class="tabs" id="tabs" role="tablist" aria-label="Aufgabenfilter">
        <button class="tab active" data-filter="all" role="tab" aria-selected="true">Alle</button>
        <button class="tab" data-filter="today" role="tab" aria-selected="false">Heute</button>
        <button class="tab" data-filter="planned" role="tab" aria-selected="false">Geplant</button>
        <button class="tab" data-filter="completed" role="tab" aria-selected="false">Erledigt</button>
      </div>

      <div class="list-heading" aria-hidden="true"><span>Aufgabe</span><span>Kategorie</span><span>Fälligkeit</span><span></span></div>
      <div class="task-list" id="taskList" aria-live="polite"></div>
      <div class="empty" id="emptyState"><strong>Hier ist gerade nichts zu tun.</strong><span>Füge eine Aufgabe hinzu oder wähle einen anderen Filter.</span></div>
    </main>

    <aside class="summary" aria-label="Tagesübersicht">
      <h2>Heute</h2>
      <div class="progress-wrap">
        <div class="progress-ring" id="progressRing"><div class="progress-copy"><strong id="progressFraction">0/0</strong><span>erledigt</span></div></div>
        <p class="progress-label" id="progressLabel">0 von 0 erledigt</p>
      </div>
      <section class="summary-group"><h3>Heute fällig</h3><div id="todaySummary"></div></section>
      <section class="summary-group"><h3>Überfällig</h3><div id="overdueSummary"></div></section>
      <section class="summary-group"><h3>Demnächst</h3><div id="nextSummary"></div></section>
    </aside>
  </div>
  <div class="toast" id="toast" role="status"></div>

  <script>
    const storageKey = 'fokus-tasks-v1';
    const toISO = (date) => date.toISOString().slice(0, 10);
    const shiftDate = (days) => { const d = new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate() + days); return toISO(d); };
    const today = () => toISO(new Date());
    const seedTasks = () => [
      { id: crypto.randomUUID(), title: 'Projektplan finalisieren', category: 'Arbeit', due: shiftDate(-1), completed: false },
      { id: crypto.randomUUID(), title: 'Kundenfeedback auswerten', category: 'Arbeit', due: shiftDate(0), completed: false },
      { id: crypto.randomUUID(), title: 'Einkaufsliste für Samstag', category: 'Privat', due: shiftDate(0), completed: false },
      { id: crypto.randomUUID(), title: 'Präsentation vorbereiten', category: 'Arbeit', due: shiftDate(2), completed: false },
      { id: crypto.randomUUID(), title: 'Arzttermin vereinbaren', category: 'Gesundheit', due: shiftDate(4), completed: false },
      { id: crypto.randomUUID(), title: 'Steuerunterlagen sortieren', category: 'Finanzen', due: shiftDate(-2), completed: true },
      { id: crypto.randomUUID(), title: 'Workout planen', category: 'Gesundheit', due: shiftDate(1), completed: true }
    ];

    let tasks;
    try { tasks = JSON.parse(localStorage.getItem(storageKey)) || seedTasks(); } catch { tasks = seedTasks(); }
    let activeFilter = 'all';
    let searchTerm = '';

    const $ = (id) => document.getElementById(id);
    const taskList = $('taskList');
    const emptyState = $('emptyState');
    const taskDate = $('taskDate');
    taskDate.value = today();
    taskDate.min = shiftDate(-365);
    $('dateLine').textContent = new Intl.DateTimeFormat('de-DE', { weekday: 'long', day: '2-digit', month: 'long' }).format(new Date());

    function save() { localStorage.setItem(storageKey, JSON.stringify(tasks)); }
    function formatDate(value) {
      if (value === today()) return 'Heute';
      return new Intl.DateTimeFormat('de-DE', { day: '2-digit', month: 'short' }).format(new Date(`${value}T12:00:00`));
    }
    function dateClass(task) { return !task.completed && task.due < today() ? 'overdue' : task.due === today() ? 'today' : ''; }
    function filteredTasks() {
      return tasks.filter(task => {
        const filterMatch = activeFilter === 'all' ||
          (activeFilter === 'today' && task.due === today() && !task.completed) ||
          (activeFilter === 'planned' && task.due > today() && !task.completed) ||
          (activeFilter === 'completed' && task.completed);
        return filterMatch && task.title.toLowerCase().includes(searchTerm.toLowerCase());
      }).sort((a,b) => Number(a.completed) - Number(b.completed) || a.due.localeCompare(b.due));
    }

    const trashIcon = '<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16m-10 4v6m4-6v6M9 7l1-3h4l1 3m3 0-1 14H7L6 7"/></svg>';

    function renderTasks() {
      const visible = filteredTasks();
      taskList.innerHTML = visible.map(task => `
        <article class="task ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          <label class="task-main"><input class="check" type="checkbox" ${task.completed ? 'checked' : ''} aria-label="${task.completed ? 'Als offen markieren' : 'Als erledigt markieren'}"><span class="task-title"></span></label>
          <span class="category" data-category="${task.category}"><span class="category-dot"></span>${task.category}</span>
          <span class="date ${dateClass(task)}">${formatDate(task.due)}</span>
          <span class="task-actions"><button class="icon-button delete" aria-label="Aufgabe löschen">${trashIcon}</button></span>
        </article>`).join('');
      visible.forEach((task, index) => taskList.children[index].querySelector('.task-title').textContent = task.title);
      emptyState.classList.toggle('show', visible.length === 0);
      renderSummary();
    }

    function summaryItems(items) {
      if (!items.length) return '<p class="summary-item">Keine Aufgaben</p>';
      return items.slice(0, 3).map(task => `<div class="summary-item"><span class="category-dot"></span><span></span></div>`).join('');
    }

    function fillSummary(containerId, items) {
      const node = $(containerId);
      node.innerHTML = summaryItems(items);
      items.slice(0, 3).forEach((task, index) => {
        const item = node.children[index];
        if (item && item.children[1]) item.children[1].textContent = task.title;
      });
    }

    function renderSummary() {
      const done = tasks.filter(task => task.completed).length;
      const total = tasks.length;
      const degrees = total ? Math.round(done / total * 360) : 0;
      $('progressRing').style.setProperty('--progress', `${degrees}deg`);
      $('progressFraction').textContent = `${done}/${total}`;
      $('progressLabel').textContent = `${done} von ${total} erledigt`;
      fillSummary('todaySummary', tasks.filter(task => !task.completed && task.due === today()));
      fillSummary('overdueSummary', tasks.filter(task => !task.completed && task.due < today()));
      fillSummary('nextSummary', tasks.filter(task => !task.completed && task.due > today()).sort((a,b) => a.due.localeCompare(b.due)));
    }

    function setFilter(filter) {
      activeFilter = filter;
      document.querySelectorAll('[data-filter]').forEach(button => {
        const active = button.dataset.filter === filter;
        button.classList.toggle('active', active);
        if (button.classList.contains('tab')) button.setAttribute('aria-selected', active);
      });
      renderTasks();
    }

    let toastTimer;
    function toast(message) {
      clearTimeout(toastTimer);
      $('toast').textContent = message;
      $('toast').classList.add('show');
      toastTimer = setTimeout(() => $('toast').classList.remove('show'), 1800);
    }

    $('taskForm').addEventListener('submit', event => {
      event.preventDefault();
      const title = $('taskTitle').value.trim();
      if (!title) return;
      tasks.push({ id: crypto.randomUUID(), title, category: $('taskCategory').value, due: taskDate.value, completed: false });
      save();
      $('taskTitle').value = '';
      setFilter('all');
      toast('Aufgabe hinzugefügt');
      $('taskTitle').focus();
    });

    taskList.addEventListener('change', event => {
      if (!event.target.matches('.check')) return;
      const task = tasks.find(item => item.id === event.target.closest('.task').dataset.id);
      task.completed = event.target.checked;
      save(); renderTasks(); toast(task.completed ? 'Aufgabe erledigt' : 'Aufgabe wieder geöffnet');
    });

    taskList.addEventListener('click', event => {
      const button = event.target.closest('.delete');
      if (!button) return;
      const id = button.closest('.task').dataset.id;
      tasks = tasks.filter(task => task.id !== id);
      save(); renderTasks(); toast('Aufgabe gelöscht');
    });

    document.querySelectorAll('[data-filter]').forEach(button => button.addEventListener('click', () => setFilter(button.dataset.filter)));
    $('searchToggle').addEventListener('click', () => {
      const open = $('searchBox').classList.toggle('open');
      $('searchToggle').setAttribute('aria-expanded', open);
      if (open) $('searchInput').focus();
    });
    $('searchInput').addEventListener('input', event => { searchTerm = event.target.value; renderTasks(); });

    renderTasks();
  </script>
</body>
</html>
